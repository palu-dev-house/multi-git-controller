<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:" />
  <title>Multi-Git Controller</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Titlebar -->
  <div class="titlebar">
    <span class="titlebar-text">Multi-Git Controller</span>
  </div>

  <!-- Active account banner -->
  <div class="active-banner" id="active-banner">
    <div class="active-banner-inner">
      <span class="active-dot"></span>
      <span id="active-label">No account active</span>
    </div>
  </div>

  <!-- Main content -->
  <main class="content">

    <!-- Account cards -->
    <div id="accounts-list" class="accounts-grid"></div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state" style="display:none">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
      </svg>
      <h3>No accounts yet</h3>
      <p>Add your Git accounts below to start managing SSH keys.</p>
    </div>

    <!-- Add account form -->
    <div class="add-form card" id="add-form">
      <h3>Add Account</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="inp-email" placeholder="you@email.com" />
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="inp-username" placeholder="your-username" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Provider</label>
          <select id="inp-provider">
            <option value="github">GitHub</option>
            <option value="bitbucket">Bitbucket</option>
            <option value="gitlab">GitLab</option>
            <option value="codeberg">Codeberg</option>
            <option value="gitea">Gitea</option>
            <option value="sourcehut">SourceHut</option>
            <option value="azure">Azure DevOps</option>
          </select>
        </div>
        <div class="form-group">
          <label>Label</label>
          <input type="text" id="inp-label" placeholder="e.g. Work, Personal (optional)" />
        </div>
      </div>
      <button class="btn btn-primary" id="btn-add">Add Account</button>
    </div>

  </main>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="renderer.js"></script>
</body>
</html>
